<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<link rel="icon" href="/assets/img/favicon.ico">
	<meta name="robots" content="noindex, nofollow" />
	<meta name="description" content="Chopped Leagues Case Study — Tyler Kung" />
	<link rel="stylesheet" href="/css/styles.css" />
	<title>Chopped Leagues — Tyler Kung</title>
	<meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1' />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<style>
		/* Disable noise overlay so backdrop-filter works */
		body:after {
			display: none !important;
		}

		/* ===== HEADER LOGO SWAP ===== */
		.header-row .box-logo .logo-chopped {
			position: absolute;
			width: 100%;
			height: 100%;
			top: 0;
			left: 0;
			border-radius: 8px;
			object-fit: cover;
			transition: opacity 0.2s ease;
			z-index: 2;
		}
		.header-row .box-logo .logo {
			z-index: 1;
		}
		.header-row .box-logo:hover .logo-chopped {
			opacity: 0;
		}

		/* ===== HERO SPLASH ===== */
		.hero-splash {
			text-align: center;
			padding: 48px 0 64px;
			margin-bottom: 24px;
			background: radial-gradient(ellipse at center, rgba(33, 33, 33, 1) 0%, rgba(33, 33, 33, 0.95) 30%, rgba(33, 33, 33, 0.7) 50%, transparent 75%);
		}
		.hero-splash .hero-icon {
			width: 120px;
			margin-bottom: 24px;
			border-radius: 22px;
		}
		.hero-splash .hero-title {
			font-family: "Tomorrow", Helvetica, Arial, sans-serif;
			font-size: 3em;
			font-weight: 600;
			letter-spacing: -1px;
			line-height: 1.1;
			margin-bottom: 16px;
		}
		@media (max-width: 767px) {
			.hero-splash .hero-title { font-size: 2em; }
			.hero-splash { padding: 48px 0 40px; }
		}
		.hero-splash .hero-subtitle {
			font-family: "Inter", Helvetica, Arial, sans-serif;
			font-size: 0.75em;
			font-weight: 400;
			line-height: 1.7;
			max-width: 560px;
			margin: 0 auto 24px;
		}
		.hero-splash .hero-phones {
			display: flex;
			justify-content: center;
			gap: 24px;
			align-items: flex-end;
			margin-top: 48px;
		}
		.hero-splash .hero-phones .phone {
			flex: 0 1 220px;
			max-width: 220px;
		}
		.hero-splash .hero-phones .phone:first-child {
			transform: rotate(-4deg);
		}
		.hero-splash .hero-phones .phone:last-child {
			transform: rotate(4deg);
		}
		.hero-splash .hero-phones .phone img {
			width: 100%;
			border-radius: 16px;
			box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
		}
		@media (max-width: 767px) {
			.hero-splash .hero-phones .phone {
				flex: 0 1 160px;
				max-width: 160px;
			}
		}

		/* ===== PASSWORD GATE ===== */
		.gate {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 10000;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			background-color: #212121;
			transition: opacity 0.5s ease, visibility 0.5s ease;
		}
		.gate.unlocked {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
		}
		.gate-box {
			text-align: center;
			max-width: 400px;
			padding: 48px 40px;
			border-radius: 8px;
			background-color: rgba(33, 33, 33, 0.6);
			backdrop-filter: blur(8px);
			-webkit-backdrop-filter: blur(8px);
			outline: 2px solid #BFEAFC;
		}
		.gate-box h2 {
			margin-top: 0;
			font-size: 1.4em;
		}
		.gate-box p {
			font-size: 0.75em;
			opacity: 0.6;
			margin-bottom: 24px;
		}
		.gate-input {
			width: 100%;
			padding: 12px 16px;
			border: 2px solid rgba(191, 234, 252, 0.3);
			border-radius: 8px;
			background: rgba(10, 10, 18, 0.6);
			color: #BFEAFC;
			font-family: "Tomorrow", Helvetica, Arial, sans-serif;
			font-size: 1em;
			font-weight: 300;
			letter-spacing: 2px;
			text-align: center;
			outline: none;
			transition: border-color 0.3s ease, box-shadow 0.3s ease;
		}
		.gate-input:focus {
			border-color: #BFEAFC;
			box-shadow: 0 0 16px rgba(191, 234, 252, 0.15);
		}
		.gate-input.error {
			border-color: #FF6B6B;
			animation: shake 0.4s ease;
		}
		@keyframes shake {
			0%, 100% { transform: translateX(0); }
			25% { transform: translateX(-8px); }
			50% { transform: translateX(8px); }
			75% { transform: translateX(-4px); }
		}

		/* ===== CASE STUDY LAYOUT ===== */
		.case-study-wrapper {
			max-width: 900px;
			margin: 0 auto;
			padding: 0 24px 80px;
			align-self: flex-start;
		}
		@media (min-width: 968px) {
			.case-study-wrapper { padding: 0 32px 120px; }
		}
		.case-study-wrapper .section-box {
			position: relative;
			margin-bottom: 24px;
			padding: 48px 40px 40px;
			height: auto !important;
			font-family: "Inter", Helvetica, Arial, sans-serif;
		}
		@media (max-width: 767px) {
			.case-study-wrapper .section-box { padding: 48px 20px 32px; }
		}
		.case-study-wrapper .section-box .tag {
			font-family: "Tomorrow", Helvetica, Arial, sans-serif;
		}
		.section-box h2 {
			font-size: 1.6em;
			margin-top: 0;
			margin-bottom: 16px;
		}
		@media (max-width: 767px) {
			.section-box h2 { font-size: 1.3em; }
		}
		.section-box h3 {
			font-size: 1.1em;
			margin-top: 32px;
			margin-bottom: 8px;
			color: #E9DAA1;
		}
		.section-box p {
			font-family: "Inter", Helvetica, Arial, sans-serif;
			font-size: 0.75em;
			font-weight: 400;
			line-height: 1.8;
			margin-bottom: 16px;
		}
		.section-box ul {
			padding-left: 20px;
			margin-bottom: 16px;
		}
		.section-box li {
			font-family: "Inter", Helvetica, Arial, sans-serif;
			font-size: 0.75em;
			font-weight: 400;
			color: #BFEAFC;
			line-height: 1.8;
			margin-bottom: 8px;
		}
		.section-box li strong {
			color: #E9DAA1;
			font-weight: 500;
		}
		.section-box .callout {
			border-left: 3px solid #E9DAA1;
			padding: 16px 20px;
			margin: 24px 0;
			background: rgba(233, 218, 161, 0.05);
			border-radius: 0 8px 8px 0;
		}
		.section-box .callout p {
			margin-bottom: 0;
			font-style: italic;
		}
		.section-box .stats-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
			gap: 16px;
			margin: 24px 0;
		}
		.section-box .stat-card {
			padding: 20px;
			border-radius: 8px;
			background: rgba(33, 33, 33, 0.4);
			outline: 1px solid rgba(191, 234, 252, 0.2);
			text-align: center;
		}
		.section-box .stat-value {
			font-size: 1.4em;
			font-weight: 600;
			color: #E9DAA1;
			display: block;
			margin-bottom: 4px;
		}
		.section-box .stat-label {
			font-size: 0.65em;
			font-weight: 300;
		}
		.section-box .phone-pair {
			display: flex;
			gap: 24px;
			justify-content: center;
			align-items: flex-start;
			margin: 32px 0 40px;
		}
		@media (max-width: 767px) {
			.section-box .phone-pair {
				flex-direction: column;
				align-items: center;
				gap: 16px;
			}
		}
		.section-box .phone-pair .phone {
			flex: 0 1 260px;
			max-width: 260px;
		}
		.section-box .phone-pair .phone img {
			width: 100%;
			border-radius: 12px;
			outline: 1px solid rgba(191, 234, 252, 0.1);
		}
		.section-box .phone-pair .phone-label {
			text-align: center;
			font-size: 0.65em;
			font-weight: 400;
			color: #E9DAA1;
			margin-top: 8px;
		}
		/* ===== TWO-COL FEATURE LAYOUT ===== */
		.section-box .feature-row {
			display: flex;
			gap: 32px;
			align-items: flex-start;
			margin: 32px 0;
		}
		.section-box .feature-row:nth-child(even) {
			flex-direction: row-reverse;
		}
		.section-box .feature-row .feature-text {
			flex: 1;
			min-width: 0;
		}
		.section-box .feature-row .feature-text h3 {
			margin-top: 0;
		}
		.section-box .feature-row .feature-phone {
			flex: 0 0 220px;
		}
		.section-box .feature-row .feature-phone img {
			width: 100%;
			border-radius: 12px;
			outline: 1px solid rgba(191, 234, 252, 0.1);
		}
		@media (max-width: 767px) {
			.section-box .feature-row,
			.section-box .feature-row:nth-child(even) {
				flex-direction: column;
				align-items: center;
			}
			.section-box .feature-row .feature-phone {
				flex: 0 0 auto;
				max-width: 260px;
				width: 100%;
			}
		}

		/* ===== TIMELINE ===== */
		.timeline {
			display: flex;
			position: relative;
			margin: 32px 0 16px;
			padding: 0;
			list-style: none;
		}
		.timeline::before {
			content: '';
			position: absolute;
			top: 10px;
			left: 0;
			right: 0;
			height: 2px;
			background: rgba(191, 234, 252, 0.2);
		}
		.timeline .tl-item {
			flex: 1;
			position: relative;
			padding-top: 28px;
			font-family: "Inter", Helvetica, Arial, sans-serif;
		}
		.timeline .tl-item::before {
			content: '';
			position: absolute;
			top: 4px;
			left: 0;
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: #BFEAFC;
			border: 2px solid #212121;
		}
		.timeline .tl-item.tl-launch::before {
			background: #E9DAA1;
			box-shadow: 0 0 8px rgba(233, 218, 161, 0.4);
		}
		.timeline .tl-date {
			font-size: 0.7em;
			font-weight: 500;
			color: #E9DAA1;
			display: block;
			margin-bottom: 4px;
		}
		.timeline .tl-label {
			font-size: 0.65em;
			font-weight: 400;
			color: #BFEAFC;
		}
		@media (max-width: 767px) {
			.timeline {
				flex-direction: column;
				gap: 24px;
				padding-left: 24px;
			}
			.timeline::before {
				top: 0;
				bottom: 0;
				left: 5px;
				right: auto;
				width: 2px;
				height: auto;
			}
			.timeline .tl-item {
				padding-top: 0;
				padding-left: 0;
			}
			.timeline .tl-item::before {
				top: 2px;
				left: -24px;
			}
		}

		.section-box .footer-sig {
			text-align: center;
			font-size: 0.7em;
			margin-top: 64px;
		}
	</style>
</head>

<script>
(function() {
	var gate = document.getElementById('gate');
	var input = document.getElementById('gate-input');
	var mount = document.getElementById('content-mount');
	var blob = JSON.parse(document.getElementById('encrypted-content').textContent);

	function b64decode(s) {
		var bin = atob(s);
		var bytes = new Uint8Array(bin.length);
		for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
		return bytes;
	}

	async function decrypt(password) {
		var enc = new TextEncoder();
		var keyMaterial = await crypto.subtle.importKey(
			'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
		);
		var key = await crypto.subtle.deriveKey(
			{ name: 'PBKDF2', salt: b64decode(blob.salt), iterations: blob.iter, hash: 'SHA-256' },
			keyMaterial,
			{ name: 'AES-GCM', length: 256 },
			false,
			['decrypt']
		);
		var plaintext = await crypto.subtle.decrypt(
			{ name: 'AES-GCM', iv: b64decode(blob.iv) },
			key,
			b64decode(blob.ct)
		);
		return new TextDecoder().decode(plaintext);
	}

	function unlock(html) {
		mount.innerHTML = html;
		gate.classList.add('unlocked');
		setTimeout(function() { gate.remove(); }, 600);
	}

	function reject() {
		input.classList.add('error');
		input.value = '';
		input.setAttribute('placeholder', 'try again');
		setTimeout(function() { input.classList.remove('error'); }, 500);
	}

	var cached = sessionStorage.getItem('chopped_content');
	if (cached) {
		unlock(cached);
		return;
	}

	input.addEventListener('keydown', async function(e) {
		if (e.key !== 'Enter') return;
		try {
			var html = await decrypt(input.value.trim().toLowerCase());
			sessionStorage.setItem('chopped_content', html);
			unlock(html);
		} catch (err) {
			reject();
		}
	});
})();
</script>
